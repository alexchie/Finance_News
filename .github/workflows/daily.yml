name: 每日財經情報自動生成

on:
  schedule:
    # 台灣時間 7:30 AM = UTC 前一天 23:30
    # 提早排程以吸收 GitHub Actions 最多 30 分鐘的排隊延遲，
    # 確保腳本執行 + GitHub Pages 部署在 8:30 前完成。
    - cron: '30 23 * * *'
  workflow_dispatch:          # 可在 GitHub 網站手動觸發

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 取得 repo 內容
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install anthropic feedparser yfinance

      - name: 執行生成腳本
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
        run: python generate.py

      - name: Commit 並推送新檔案
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "📰 每日情報 ${{ env.TODAY || 'auto' }}"
          git push
